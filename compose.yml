name: ${DOCKER_NAME}
services:
  nginx:
    image: "nginx:1.27-alpine"
    ports:
      - "${HTTP_BIND}:${HTTP_PORT}:80"
      - "443:443"
    volumes:
      - ./.huly.nginx:/etc/nginx/conf.d/default.conf
      - /home/ubuntu/certs:/etc/nginx/certs:ro
    restart: unless-stopped
    networks:
      - huly_net

  cockroach:
    image: cockroachdb/cockroach:latest-v24.2
    command: start-single-node --accept-sql-without-tls
    environment:
      - COCKROACH_DATABASE=${CR_DATABASE}
      - COCKROACH_USER=${CR_USERNAME}
      - COCKROACH_PASSWORD=${CR_USER_PASSWORD}
    volumes:
      - ${VOLUME_CR_DATA_PATH:-cr_data}:/cockroach/cockroach-data
      - ${VOLUME_CR_CERTS_PATH:-cr_certs}:/cockroach/certs
    restart: unless-stopped
    networks:
      - huly_net

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.3.6
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
      - --mode dev-container
      - --smp 1
      - --default-log-level=info
    volumes:
      - ${VOLUME_REDPANDA_PATH:-redpanda}:/var/lib/redpanda/data
    environment:
      - REDPANDA_SUPERUSER_USERNAME=${REDPANDA_ADMIN_USER}
      - REDPANDA_SUPERUSER_PASSWORD=${REDPANDA_ADMIN_PWD}
    healthcheck:
      test: ['CMD', 'rpk', 'cluster', 'info']
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - huly_net

  minio:
    image: "minio/minio"
    command: server /data --address ":9000" --console-address ":9001"
    volumes:
      - ${VOLUME_FILES_PATH:-files}:/data
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - huly_net

  elastic:
    image: "elasticsearch:7.14.2"
    command: |
      /bin/sh -c "./bin/elasticsearch-plugin list | grep -q ingest-attachment || yes | ./bin/elasticsearch-plugin install --silent ingest-attachment;
      /usr/local/bin/docker-entrypoint.sh eswrapper"
    volumes:
      - ${VOLUME_ELASTIC_PATH:-elastic}:/usr/share/elasticsearch/data
    environment:
      - ELASTICSEARCH_PORT_NUMBER=9200
      - BITNAMI_DEBUG=true
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms1024m -Xmx1024m
      - http.cors.enabled=true
      - http.cors.allow-origin=http://localhost:8082
    healthcheck:
      interval: 20s
      retries: 10
      test: curl -s http://localhost:9200/_cluster/health | grep -vq '"status":"red"'
    restart: unless-stopped
    networks:
      - huly_net

  mongodb:
    image: mongo:7-jammy
    restart: unless-stopped
    volumes:
      - ${VOLUME_MONGO_PATH:-mongodb}:/data/db
    networks:
      - huly_net
     # Required by aibot and calendar services

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    networks:
      - huly_net
    # Required by HulyPulse (push notifications / real-time updates)

  hulypulse:
    image: hardcoreeng/service_hulypulse:${HULY_PULSE_VERSION:-0.1.29}
    ports:
      - 8099:8099
    environment:
      - HULY_BIND_PORT=8099
      - HULY_LOG=info
      - HULY_TOKEN_SECRET=${SECRET}
      - HULY_HEARTBEAT_TIMEOUT=60
      - HULY_BACKEND=memory
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped
    networks:
      - huly_net

  love:
    image: hardcoreeng/love:${HULY_VERSION}
    ports:
      - 8096:8096
    environment:
      - PORT=8096
      - SECRET=${SECRET}
      - ACCOUNTS_URL=http://account:3000
      - DB_URL=${CR_DB_URL}
      # Love's config parser keeps only protocol://hostname for `endpoint`; path
      # and port are dropped. rootBucket makes love tell LiveKit Egress to PUT
      # at <endpoint>/<rootBucket>/<object> â€” i.e. path-style S3.
      - STORAGE_CONFIG=s3|${LIVEKIT_RECORD_ENDPOINT}?accessKey=${AWS_S3_ACCESS_KEY}&secretKey=${AWS_S3_SECRET_KEY}&region=${AWS_S3_REGION}&rootBucket=${LIVEKIT_RECORD_BUCKET}
      - STORAGE_PROVIDER_NAME=s3
      - LIVEKIT_HOST=${LIVEKIT_HOST}
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET}
    restart: unless-stopped
    networks:
      - huly_net

  # Huly's UI renders transcripts only when they arrive as ChatMessages on the
  # meeting minutes doc, which only happens when the upstream love-agent worker
  # POSTs them to aibot's /love/transcript. That endpoint requires a JWT with
  # `account` == aibot's personUuid (assigned on first signup).
  #
  # The `hardcoreeng/tool` image ships a `generate-token` subcommand that does
  # the socialId lookup and mints the token via the official
  # @hcengineering/server-token library. Quirk: this CLI queries `socialId.value`
  # (plain email, no `email:` prefix) whereas the accounts-RPC findPersonBySocialKey
  # queries `socialId.key` (prefixed). Pass the plain email here.
  # We retry because aibot's signUp writes the socialId row async on first boot;
  # until it lands, the tool throws `Invalid account uuid` and emits no token.
  love-agent-init:
    image: hardcoreeng/tool:${HULY_VERSION}
    depends_on:
      - account
      - aibot
    environment:
      - SERVER_SECRET=${SECRET}
      - ACCOUNTS_URL=http://account:3000
      - ACCOUNT_DB_URL=${CR_DB_URL}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        i=0
        while [ $$i -lt 60 ]; do
          i=$$((i + 1))
          # Workspace arg is required by the CLI and must pass UUID validation
          # in generateToken. aibot's /love/transcript only checks the `account`
          # claim, so the nil UUID is safe as a placeholder.
          TOKEN=$$(node /usr/src/app/bundle.js generate-token huly.ai.bot@hc.engineering 00000000-0000-0000-0000-000000000000 2>/tmp/err || true)
          ACCOUNT=$$(printf '%s' "$$TOKEN" | cut -d. -f2 | tr '_-' '/+' | base64 -d 2>/dev/null | sed -n 's/.*"account":"\([^"]*\)".*/\1/p')
          case "$$ACCOUNT" in
            [0-9a-f]*-[0-9a-f]*-*)
              printf '%s' "$$TOKEN" > /shared/platform_token
              echo "Wrote /shared/platform_token (account=$$ACCOUNT)"
              exit 0
              ;;
            *)
              echo "attempt $$i: no token yet; tool stderr:"
              head -5 /tmp/err | sed 's/^/  /'
              sleep 5
              ;;
          esac
        done
        echo "ERROR: failed to resolve aibot personUuid after $$i attempts" >&2
        exit 1
    volumes:
      - platform_token:/shared
    restart: "no"
    networks:
      - huly_net

  love-agent:
    image: hardcoreeng/love-agent:${HULY_VERSION}
    depends_on:
      love-agent-init:
        condition: service_completed_successfully
    # Load PLATFORM_TOKEN from the shared volume at container start. Can't set
    # it in `environment:` because the init step runs in a separate container
    # and the token is only known at runtime.
    command:
      - /bin/sh
      - -c
      - |
        export PLATFORM_TOKEN=$$(cat /shared/platform_token) && \
        exec node index.js start
    environment:
      - DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY}
      - STT_PROVIDER=deepgram
      - LIVEKIT_URL=${LIVEKIT_HOST}
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET}
      - PLATFORM_URL=http://aibot:4010
    volumes:
      - platform_token:/shared:ro
    restart: unless-stopped
    networks:
      - huly_net

  aibot:
    image: hardcoreeng/ai-bot:${HULY_VERSION}
    ports:
      - 4010:4010
    environment:
      - STORAGE_CONFIG=minio|minio?accessKey=minioadmin&secretKey=minioadmin
      - SERVER_SECRET=${SECRET}
      - ACCOUNTS_URL=http://account:3000
      - DB_URL=${CR_DB_URL}
      - MONGO_URL=mongodb://mongodb:27017
      - STATS_URL=http://stats:4900
      - FIRST_NAME=Huly
      - LAST_NAME=AI
      - PASSWORD=${AIBOT_PASSWORD}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - AI_OPENAI_MODEL=${AI_OPENAI_MODEL}
      - AI_OPENAI_TRANSLATE_MODEL=${AI_OPENAI_TRANSLATE_MODEL}
      - AI_OPENAI_SUMMARY_MODEL=${AI_OPENAI_SUMMARY_MODEL}
      - LOVE_ENDPOINT=http://love:8096
    restart: unless-stopped
    networks:
      - huly_net

  # Sends signup confirmation and notification emails via Resend's SMTP relay.
  # Resend SMTP wants the literal username "resend" and the API key as the
  # password â€” there is no separate SMTP credential.
  mail:
    image: hardcoreeng/mail:${HULY_VERSION}
    environment:
      - PORT=8097
      - SOURCE=${MAIL_SOURCE}
      - SMTP_HOST=smtp.resend.com
      - SMTP_PORT=587
      - SMTP_USERNAME=resend
      - SMTP_PASSWORD=${RESEND_API_KEY}
    restart: unless-stopped
    networks:
      - huly_net

  rekoni:
    image: hardcoreeng/rekoni-service:${HULY_VERSION}
    environment:
      - SECRET=${SECRET}
    deploy:
      resources:
        limits:
          memory: 500M
    restart: unless-stopped
    networks:
      - huly_net

  transactor:
    image: hardcoreeng/transactor:${HULY_VERSION}
    depends_on:
      redpanda:
        condition: service_healthy
    environment:
      - SERVER_PORT=3333
      - SERVER_SECRET=${SECRET}
      - DB_URL=${CR_DB_URL}
      - STORAGE_CONFIG=minio|minio?accessKey=minioadmin&secretKey=minioadmin
      - FRONT_URL=http://localhost:8087
      - ACCOUNTS_URL=http://account:3000
      - FULLTEXT_URL=http://fulltext:4700
      - STATS_URL=http://stats:4900
      - LAST_NAME_FIRST=${LAST_NAME_FIRST:-true}
      - QUEUE_CONFIG=redpanda:9092
      - PULSE_URL=http://hulypulse:8099
      - AI_BOT_URL=http://aibot:4010
      - MAIL_URL=http://mail:8097
    restart: unless-stopped
    networks:
      - huly_net

  collaborator:
    image: hardcoreeng/collaborator:${HULY_VERSION}
    environment:
      - COLLABORATOR_PORT=3078
      - SECRET=${SECRET}
      - ACCOUNTS_URL=http://account:3000
      - STATS_URL=http://stats:4900
      - STORAGE_CONFIG=minio|minio?accessKey=minioadmin&secretKey=minioadmin
    restart: unless-stopped
    networks:
      - huly_net

  account:
    image: hardcoreeng/account:${HULY_VERSION}
    depends_on:
      redpanda:
        condition: service_healthy
    environment:
      - DISABLE_SIGNUP=${DISABLE_SIGNUP:-}
      - SERVER_PORT=3000
      - SERVER_SECRET=${SECRET}
      - DB_URL=${CR_DB_URL}
      - TRANSACTOR_URL=ws://transactor:3333;ws${SECURE:+s}://${HOST_ADDRESS}/_transactor
      - STORAGE_CONFIG=minio|minio?accessKey=minioadmin&secretKey=minioadmin
      - FRONT_URL=http${SECURE:+s}://${HOST_ADDRESS}
      - STATS_URL=http${SECURE:+s}://${HOST_ADDRESS}/_stats
      - MODEL_ENABLED=*
      - ACCOUNTS_URL=http${SECURE:+s}://${HOST_ADDRESS}/_accounts
      - ACCOUNT_PORT=3000
      - QUEUE_CONFIG=redpanda:9092
      - MAIL_URL=http://mail:8097
      # Optional OIDC provider â€” populated when the `logto` profile is up.
      # Huly only registers the provider when all three of CLIENT_ID,
      # CLIENT_SECRET, ISSUER are non-empty (pods/authProviders/src/openid.ts:41).
      - OPENID_CLIENT_ID=${OPENID_CLIENT_ID:-}
      - OPENID_CLIENT_SECRET=${OPENID_CLIENT_SECRET:-}
      - OPENID_ISSUER=${OPENID_ISSUER:-}
      - OPENID_DISPLAY_NAME=${OPENID_DISPLAY_NAME:-}
      # Trust the self-signed nginx cert so Node's openid-client can reach
      # the OIDC discovery endpoint at ${OPENID_ISSUER} over TLS.
      # Without this the Issuer.discover() call fails with
      # DEPTH_ZERO_SELF_SIGNED_CERT and the provider never registers.
      - NODE_EXTRA_CA_CERTS=/etc/ssl/certs/huly-selfsigned.crt
    volumes:
      - /home/ubuntu/certs/selfsigned.crt:/etc/ssl/certs/huly-selfsigned.crt:ro
    restart: unless-stopped
    networks:
      - huly_net

  workspace:
    image: hardcoreeng/workspace:${HULY_VERSION}
    depends_on:
      redpanda:
        condition: service_healthy
    environment:
      - SERVER_SECRET=${SECRET}
      - DB_URL=${CR_DB_URL}
      - TRANSACTOR_URL=ws://transactor:3333;ws${SECURE:+s}://${HOST_ADDRESS}/_transactor
      - STORAGE_CONFIG=minio|minio?accessKey=minioadmin&secretKey=minioadmin
      - MODEL_ENABLED=*
      - ACCOUNTS_URL=http://account:3000
      - STATS_URL=http://stats:4900
      - QUEUE_CONFIG=redpanda:9092
      - ACCOUNTS_DB_URL=${CR_DB_URL}
      - INIT_REPO_DIR=/no-init-scripts
    restart: unless-stopped
    networks:
      - huly_net

  front:
    image: hardcoreeng/front:${HULY_VERSION}
    environment:
      - DISABLE_SIGNUP=${DISABLE_SIGNUP:-}
      - SERVER_PORT=8080
      - SERVER_SECRET=${SECRET}
      - LOVE_ENDPOINT=http${SECURE:+s}://${HOST_ADDRESS}/_love
      - ACCOUNTS_URL=http${SECURE:+s}://${HOST_ADDRESS}/_accounts
      - ACCOUNTS_URL_INTERNAL=http://account:3000
      - REKONI_URL=http${SECURE:+s}://${HOST_ADDRESS}/_rekoni
      - CALENDAR_URL=http${SECURE:+s}://${HOST_ADDRESS}/_calendar
      - GMAIL_URL=http${SECURE:+s}://${HOST_ADDRESS}/_gmail
      - TELEGRAM_URL=http${SECURE:+s}://${HOST_ADDRESS}/_telegram
      - STATS_URL=http${SECURE:+s}://${HOST_ADDRESS}/_stats
      - UPLOAD_URL=/files
      - ELASTIC_URL=http://elastic:9200
      - COLLABORATOR_URL=ws${SECURE:+s}://${HOST_ADDRESS}/_collaborator
      # Two-provider STORAGE_CONFIG. FallbackStorageAdapter (server-storage
      # `fallback.ts`) reverses the parsed list, so the LAST env entry becomes
      # both the put() target and the first adapter checked on stat()/get().
      # MinIO last â‡’ normal workspace blobs (attachments, Drive) stay hot-path
      # on the internal MinIO. S3 first â‡’ LiveKit recordings stored at
      # s3://${LIVEKIT_RECORD_BUCKET}/<workspaceDataId>/<uuid>.mp4 resolve as
      # a fallback so /files/<blobId> can stream them to the <video> player.
      - STORAGE_CONFIG=s3|${LIVEKIT_RECORD_ENDPOINT}?accessKey=${AWS_S3_ACCESS_KEY}&secretKey=${AWS_S3_SECRET_KEY}&region=${AWS_S3_REGION}&rootBucket=${LIVEKIT_RECORD_BUCKET};minio|minio?accessKey=minioadmin&secretKey=minioadmin
      - TITLE=${TITLE:-Huly Self Host}
      - DEFAULT_LANGUAGE=${DEFAULT_LANGUAGE:-en}
      - LAST_NAME_FIRST=${LAST_NAME_FIRST:-true}
      - DESKTOP_UPDATES_CHANNEL=${DESKTOP_CHANNEL}
      - PULSE_URL=http${SECURE:+s}://${HOST_ADDRESS}/_pulse
      - AI_URL=http${SECURE:+s}://${HOST_ADDRESS}/_aibot
      - LIVEKIT_WS=${LIVEKIT_HOST}
    restart: unless-stopped
    networks:
      - huly_net

  fulltext:
    image: hardcoreeng/fulltext:${HULY_VERSION}
    depends_on:
      redpanda:
        condition: service_healthy
    environment:
      - SERVER_SECRET=${SECRET}
      - DB_URL=${CR_DB_URL}
      - FULLTEXT_DB_URL=http://elastic:9200
      - ELASTIC_INDEX_NAME=huly_storage_index
      - STORAGE_CONFIG=minio|minio?accessKey=minioadmin&secretKey=minioadmin
      - REKONI_URL=http://rekoni:4004
      - ACCOUNTS_URL=http://account:3000
      - STATS_URL=http://stats:4900
      - QUEUE_CONFIG=redpanda:9092
    restart: unless-stopped
    networks:
      - huly_net

  stats:
    image: hardcoreeng/stats:${HULY_VERSION}
    environment:
      - PORT=4900
      - SERVER_SECRET=${SECRET}
    restart: unless-stopped
    networks:
      - huly_net

  kvs:
    image: hardcoreeng/hulykvs:${HULY_VERSION}
    depends_on:
      cockroach:
        condition: service_started
    ports:
      - 8094:8094
    environment:
      - HULY_DB_CONNECTION=${CR_DB_URL}
      - HULY_TOKEN_SECRET=${SECRET}
    restart: unless-stopped
    networks:
      - huly_net

  # --- Logto IdP (optional; enable with `--profile logto`) ---

  logto-db:
    image: postgres:14-alpine
    profiles: [logto]
    environment:
      - POSTGRES_USER=${LOGTO_DB_USER:-logto}
      - POSTGRES_PASSWORD=${LOGTO_DB_PASSWORD}
      - POSTGRES_DB=${LOGTO_DB_NAME:-logto}
    volumes:
      - ${VOLUME_LOGTO_DB_PATH:-logto_db}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${LOGTO_DB_USER:-logto}"]
      interval: 10s
      retries: 10
    restart: unless-stopped
    networks:
      - huly_net

  logto:
    image: svhd/logto:${LOGTO_VERSION:-1.23.0}
    profiles: [logto]
    depends_on:
      logto-db:
        condition: service_healthy
    # Admin console reached via SSH tunnel only (not nginx). Logto's admin SPA
    # fetches assets from absolute `/assets/*` paths that don't work under a
    # sub-path ADMIN_ENDPOINT; exposing admin through nginx would need its own
    # subdomain. Bind 3002 to the host loopback so operators tunnel to it:
    #   ssh -L 3002:localhost:3002 <user>@<host>
    #   open http://localhost:3002 in a browser
    ports:
      - "127.0.0.1:3002:3002"
    # `npm run cli db seed --swe` is idempotent: seeds an empty DB, no-ops
    # on an already-seeded one. `--swe` seeds the Sign-in Experience defaults.
    entrypoint: ["sh", "-c", "npm run cli db seed -- --swe && npm start"]
    environment:
      - TRUST_PROXY_HEADER=1
      - DB_URL=postgres://${LOGTO_DB_USER:-logto}:${LOGTO_DB_PASSWORD}@logto-db:5432/${LOGTO_DB_NAME:-logto}
      # LOGTO_HOSTNAME is the public OIDC hostname (e.g. auth.example.com). Set
      # explicitly because Huly's HOST_ADDRESS is itself a full hostname
      # (ws.example.com), so `auth.${HOST_ADDRESS}` would become auth.ws.example.com.
      # ADMIN_ENDPOINT is intentionally unset â€” admin stays on localhost:3002.
      - ENDPOINT=https://${LOGTO_HOSTNAME}
      - PORT=3001
      - ADMIN_PORT=3002
    restart: unless-stopped
    networks:
      - huly_net

volumes:
  # These named volumes are used when custom volume paths are not specified
  # If VOLUME_*_PATH variables are set, these volumes will be ignored
  elastic:
  files:
  cr_data:
  cr_certs:
  redpanda:
  mongodb:
  # tmpfs-style handoff for the forged PLATFORM_TOKEN that love-agent-init
  # writes and love-agent reads. Cleared per `docker compose down -v`.
  platform_token:
  logto_db:

networks:
  huly_net:
