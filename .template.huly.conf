HULY_VERSION=v0.7.382
DESKTOP_CHANNEL=0.7.382
DOCKER_NAME=huly_v7

# The address of the host or server from which you will access your Huly instance.
# This can be a domain name (e.g., huly.example.com) or an IP address (e.g., 192.168.1.1).
HOST_ADDRESS=${HOST_ADDRESS}

# Set this variable to 'true' to enable SSL (HTTPS/WSS). 
# Leave it empty to use non-SSL (HTTP/WS).
SECURE=${SECURE}

# Specify the IP address to bind to; leave blank to bind to all interfaces (0.0.0.0).
# Do not use IP:PORT format in HTTP_BIND or HTTP_PORT.
HTTP_PORT=${HTTP_PORT}
HTTP_BIND=${HTTP_BIND}

# Huly specific variables
TITLE=${TITLE}
DEFAULT_LANGUAGE=${DEFAULT_LANGUAGE}
LAST_NAME_FIRST=${LAST_NAME_FIRST}

# Set to 'true' to block public sign-ups; new accounts only via invite links.
DISABLE_SIGNUP=${DISABLE_SIGNUP}

# Set to 'true' to hide the email/password login form in favor of SSO-only
# sign-in (ProvidersOnlyForm). Leave empty unless an external provider like
# Logto is configured — otherwise users will have no way to sign in.
HIDE_LOCAL_LOGIN=${HIDE_LOCAL_LOGIN}

# CockroachDB variables
CR_DATABASE=${CR_DATABASE}
CR_USERNAME=${CR_USERNAME}
CR_USER_PASSWORD=${COCKROACH_SECRET}
CR_DB_URL=postgres://${CR_USERNAME}:${COCKROACH_SECRET}@cockroach:26257/${CR_DATABASE}

# Redpanda variables
REDPANDA_ADMIN_USER=${REDPANDA_ADMIN_USER}
REDPANDA_ADMIN_PWD=${REDPANDA_SECRET}

# Mail (Resend SMTP) — used by the `mail` service for signup confirmation
# and notification emails. MAIL_SOURCE is the From: address and must be on a
# domain verified in the Resend dashboard.
RESEND_API_KEY=${RESEND_API_KEY}
MAIL_SOURCE=${MAIL_SOURCE}

# Docker volume paths - specify custom paths for persistent data storage
# Leave empty to use default Docker named volumes
VOLUME_ELASTIC_PATH=${VOLUME_ELASTIC_PATH}
VOLUME_FILES_PATH=${VOLUME_FILES_PATH}
VOLUME_CR_DATA_PATH=${VOLUME_CR_DATA_PATH}
VOLUME_CR_CERTS_PATH=${VOLUME_CR_CERTS_PATH}
VOLUME_REDPANDA_PATH=${VOLUME_REDPANDA_PATH}

# The following configs are auto-generated by the setup script. 
# Please do not manually overwrite.

# Run with --secret to regenerate.
SECRET=${HULY_SECRET}

# LiveKit (love service - audio/video calls)
LIVEKIT_HOST=${LIVEKIT_HOST}
LIVEKIT_API_KEY=${LIVEKIT_API_KEY}
LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET}

# AI bot (via OpenRouter)
AIBOT_PASSWORD=${AIBOT_PASSWORD}
OPENAI_API_KEY=${OPENAI_API_KEY}
OPENAI_BASE_URL=${OPENAI_BASE_URL}
AI_OPENAI_MODEL=${AI_OPENAI_MODEL}
AI_OPENAI_TRANSLATE_MODEL=${AI_OPENAI_TRANSLATE_MODEL}
AI_OPENAI_SUMMARY_MODEL=${AI_OPENAI_SUMMARY_MODEL}

# LiveKit transcription agent (Deepgram STT)
DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY}

# AWS S3 endpoint for LiveKit Cloud Egress recording uploads. Love's storage
# parser drops URL paths, so the endpoint is the bare regional S3 hostname.
LIVEKIT_RECORD_BUCKET=${LIVEKIT_RECORD_BUCKET}
LIVEKIT_RECORD_ENDPOINT=${LIVEKIT_RECORD_ENDPOINT}
AWS_S3_REGION=${AWS_S3_REGION}
AWS_S3_ACCESS_KEY=${AWS_S3_ACCESS_KEY}
AWS_S3_SECRET_KEY=${AWS_S3_SECRET_KEY}

# --- Logto (optional; enable with `docker compose --profile logto up -d`) ---
# Only the required vars are listed. LOGTO_VERSION, LOGTO_DB_USER,
# LOGTO_DB_NAME, VOLUME_LOGTO_DB_PATH, OPENID_DISPLAY_NAME all have sensible
# defaults in compose.yml and can be omitted.

# Public hostname of the Logto IdP (e.g. auth.example.com). Must match the
# DNS record + the TLS SAN + the nginx server_name in .huly.nginx.
LOGTO_HOSTNAME=${LOGTO_HOSTNAME}

# Public hostname of the Logto admin console. Must be a DIFFERENT subdomain
# from LOGTO_HOSTNAME — Logto's admin SPA serves assets from root, which
# would collide with the OIDC endpoint if co-hosted. Also needs its own DNS
# record and TLS SAN entry.
LOGTO_ADMIN_HOSTNAME=${LOGTO_ADMIN_HOSTNAME}

# Password for the `logto` Postgres role in logto-db. Must be non-empty —
# Logto's alteration CLI rejects empty-string passwords with a type error.
LOGTO_DB_PASSWORD=${LOGTO_DB_PASSWORD}

# OIDC linkage to Huly's account service. When all three of
# CLIENT_ID/CLIENT_SECRET/ISSUER are set, the account service registers the
# provider at /providers.
OPENID_CLIENT_ID=${OPENID_CLIENT_ID}
OPENID_CLIENT_SECRET=${OPENID_CLIENT_SECRET}
OPENID_ISSUER=${OPENID_ISSUER}

# --- Let's Encrypt (used by ./issue_certs.sh and ./renew_certs.sh) ---

# Contact address for the LE account. Receives expiry-warning mail ~20 days
# before a cert lapses. Must be an address you actually read.
LETSENCRYPT_EMAIL=${LETSENCRYPT_EMAIL}
