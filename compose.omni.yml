# Omni stack — runs as a separate compose project (`-p omni`) on the same
# host as the `huly` stack. nginx in the huly stack proxies the configured
# Omni hostname (APP_URL in omni.conf) to the `omni-web` container over the
# shared `proxy_net` network.
#
# Releases:  ./release.sh  (pulls + brings up both stacks)
# Env:       /home/ubuntu/huly-selfhost/omni.conf  (gitignored, live values)
# Images:    ${OMNI_IMAGE_PREFIX}/<service>:${OMNI_VERSION}  (registry+namespace
#            from omni.conf; private GHCR namespaces require one-time `docker login`)
#
# Profile-gated connectors are enabled via ENABLED_CONNECTORS (comma-separated)
# in omni.conf; COMPOSE_PROFILES picks them up automatically.
#
# Internal-port convention: every Rust service and the AI service read `PORT`
# at startup. Internal listening ports are not bound to the host (no `ports:`
# on any service) and never collide on the docker bridge — they're hardcoded
# inline below rather than threaded through env vars. SvelteKit's adapter-node
# also reads `PORT` (defaulting to 3000); we pass it explicitly for clarity.

x-db-config: &db-config
  DATABASE_HOST: ${DATABASE_HOST}
  DATABASE_PORT: ${DATABASE_PORT}
  DATABASE_USERNAME: ${DATABASE_USERNAME}
  DATABASE_PASSWORD: ${DATABASE_PASSWORD}
  DATABASE_NAME: ${DATABASE_NAME}
  DB_MAX_CONNECTIONS: ${DB_MAX_CONNECTIONS:-10}
  DB_ACQUIRE_TIMEOUT_SECONDS: ${DB_ACQUIRE_TIMEOUT_SECONDS:-3}

x-redis-config: &redis-config
  REDIS_URL: ${REDIS_URL}

x-storage-config: &storage-config
  # Default `postgres` matches omni.conf.template's documented fallback
  # ("Storage backend (postgres = blobs in DB; s3 = use an S3 bucket)").
  # ai service rejects empty values (services/ai/storage.py:247), and the
  # AI startup loop pegs CPU when this is unset — keep the default explicit.
  STORAGE_BACKEND: ${STORAGE_BACKEND:-postgres}

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "100m"
    max-file: "10"
    compress: "true"

services:
  postgres:
    image: paradedb/paradedb:0.23.1-pg17
    container_name: omni-postgres
    shm_size: 4gb
    environment:
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME} -d ${DATABASE_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - omni_net
    restart: unless-stopped
    logging: *default-logging

  redis:
    image: redis:7-alpine
    container_name: omni-redis
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - omni_net
    restart: unless-stopped
    logging: *default-logging

  # Schema migrator: runs once per OMNI_VERSION and exits 0. Compose only
  # recreates this container when the image tag changes (i.e. on version
  # bump); on subsequent `up` calls with an unchanged image, the existing
  # Exited(0) container satisfies dependents' `service_completed_successfully`
  # immediately. To force a re-run (e.g. after manual schema surgery):
  #   docker compose -p omni rm -f migrator && docker compose -p omni ... up -d
  migrator:
    image: ${OMNI_IMAGE_PREFIX:?OMNI_IMAGE_PREFIX must be set in omni.conf}/omni-migrator:${OMNI_VERSION:-latest}
    container_name: omni-migrator
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: [*db-config]
    networks:
      - omni_net
    restart: "no"
    logging: *default-logging

  searcher:
    image: ${OMNI_IMAGE_PREFIX:?OMNI_IMAGE_PREFIX must be set in omni.conf}/omni-searcher:${OMNI_VERSION:-latest}
    container_name: omni-searcher
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    environment:
      <<: [*db-config, *redis-config, *storage-config]
      PORT: 3001
      AI_SERVICE_URL: ${AI_SERVICE_URL}
      SEMANTIC_SEARCH_TIMEOUT_MS: ${SEMANTIC_SEARCH_TIMEOUT_MS:-1000}
      RUST_LOG: ${RUST_LOG:-info}
    networks:
      - omni_net
    restart: unless-stopped
    logging: *default-logging

  indexer:
    image: ${OMNI_IMAGE_PREFIX:?OMNI_IMAGE_PREFIX must be set in omni.conf}/omni-indexer:${OMNI_VERSION:-latest}
    container_name: omni-indexer
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    environment:
      <<: [*db-config, *redis-config, *storage-config]
      PORT: 3002
      AI_SERVICE_URL: ${AI_SERVICE_URL}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      ENCRYPTION_SALT: ${ENCRYPTION_SALT}
      RUST_LOG: ${RUST_LOG:-info}
    networks:
      - omni_net
    restart: unless-stopped
    logging: *default-logging

  ai:
    image: ${OMNI_IMAGE_PREFIX:?OMNI_IMAGE_PREFIX must be set in omni.conf}/omni-ai:${OMNI_VERSION:-latest}
    container_name: omni-ai
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    environment:
      <<: [*db-config, *redis-config, *storage-config]
      PORT: 3003
      MODEL_PATH: ${MODEL_PATH:-/models}
      AI_WORKERS: ${AI_WORKERS:-2}
      SEARCHER_URL: ${SEARCHER_URL}
      CONNECTOR_MANAGER_URL: ${CONNECTOR_MANAGER_URL}
      AGENTS_ENABLED: ${AGENTS_ENABLED:-false}
      AGENT_MAX_ITERATIONS: ${AGENT_MAX_ITERATIONS:-15}
      APPROVAL_TIMEOUT_SECONDS: ${APPROVAL_TIMEOUT_SECONDS:-600}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-}
      EMBEDDING_BATCH_S3_BUCKET: ${EMBEDDING_BATCH_S3_BUCKET:-}
      EMBEDDING_BATCH_BEDROCK_ROLE_ARN: ${EMBEDDING_BATCH_BEDROCK_ROLE_ARN:-}
      EMBEDDING_BATCH_MIN_DOCUMENTS: ${EMBEDDING_BATCH_MIN_DOCUMENTS:-100}
      EMBEDDING_BATCH_MAX_DOCUMENTS: ${EMBEDDING_BATCH_MAX_DOCUMENTS:-50000}
      EMBEDDING_BATCH_ACCUMULATION_TIMEOUT_SECONDS: ${EMBEDDING_BATCH_ACCUMULATION_TIMEOUT_SECONDS:-300}
      EMBEDDING_BATCH_ACCUMULATION_POLL_INTERVAL: ${EMBEDDING_BATCH_ACCUMULATION_POLL_INTERVAL:-10}
      EMBEDDING_BATCH_MONITOR_POLL_INTERVAL: ${EMBEDDING_BATCH_MONITOR_POLL_INTERVAL:-30}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      ENCRYPTION_SALT: ${ENCRYPTION_SALT}
      MEMORY_ENABLED: ${MEMORY_ENABLED:-true}
      MEM0AI_DATABASE_USER: ${MEM0AI_DATABASE_USER:-mem0ai}
      MEM0AI_DATABASE_ROLE_PASSWORD: ${MEM0AI_DATABASE_ROLE_PASSWORD}
      MEM0_HISTORY_DB_PATH: ${MEM0_HISTORY_DB_PATH:-/var/lib/mem0/history.db}
    volumes:
      - ai_models:/models
      - mem0_history:/var/lib/mem0
    networks:
      - omni_net
    restart: unless-stopped
    logging: *default-logging

  connector-manager:
    image: ${OMNI_IMAGE_PREFIX:?OMNI_IMAGE_PREFIX must be set in omni.conf}/omni-connector-manager:${OMNI_VERSION:-latest}
    container_name: omni-connector-manager
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    environment:
      <<: [*db-config, *redis-config]
      PORT: 3004
      MAX_CONCURRENT_SYNCS: ${MAX_CONCURRENT_SYNCS:-10}
      MAX_CONCURRENT_SYNCS_PER_TYPE: ${MAX_CONCURRENT_SYNCS_PER_TYPE:-3}
      SCHEDULER_INTERVAL_SECONDS: ${SCHEDULER_INTERVAL_SECONDS:-60}
      STALE_SYNC_TIMEOUT_MINUTES: ${STALE_SYNC_TIMEOUT_MINUTES:-60}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      ENCRYPTION_SALT: ${ENCRYPTION_SALT}
      RUST_LOG: ${RUST_LOG:-info}
    networks:
      - omni_net
    restart: unless-stopped
    logging: *default-logging

  # `container_name: omni-web` already registers omni-web as a DNS alias on
  # every network the container joins, so nginx (on proxy_net) can resolve
  # `omni-web:3000` without an explicit `aliases:` block.
  web:
    # OMNI_WEB_VERSION lets us pin the web service to a different tag than the
    # rest of the stack — e.g. a `master-<sha>` build of just the web service
    # for a hotfix, while keeping searcher/indexer/ai/etc. on the last full
    # release. Falls through to OMNI_VERSION when unset.
    image: ${OMNI_IMAGE_PREFIX:?OMNI_IMAGE_PREFIX must be set in omni.conf}/omni-web:${OMNI_WEB_VERSION:-${OMNI_VERSION:-latest}}
    container_name: omni-web
    depends_on:
      - searcher
      - indexer
      - ai
      - connector-manager
    environment:
      <<: [*db-config, *redis-config]
      PORT: 3000
      SEARCHER_URL: ${SEARCHER_URL}
      INDEXER_URL: ${INDEXER_URL}
      AI_SERVICE_URL: ${AI_SERVICE_URL}
      CONNECTOR_MANAGER_URL: ${CONNECTOR_MANAGER_URL}
      APP_URL: ${APP_URL}
      ORIGIN: ${APP_URL}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-auth-session}
      SESSION_DURATION_DAYS: ${SESSION_DURATION_DAYS:-7}
      AI_ANSWER_ENABLED: ${AI_ANSWER_ENABLED:-false}
      AGENTS_ENABLED: ${AGENTS_ENABLED:-false}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      ENCRYPTION_SALT: ${ENCRYPTION_SALT}
    networks:
      - omni_net
      - proxy_net
    restart: unless-stopped
    logging: *default-logging

  web-connector:
    image: ${OMNI_IMAGE_PREFIX:?OMNI_IMAGE_PREFIX must be set in omni.conf}/omni-web-connector:${OMNI_VERSION:-latest}
    container_name: omni-web-connector
    profiles: [web]
    depends_on:
      connector-manager:
        condition: service_started
    environment:
      <<: [*redis-config]
      PORT: 4004
      # Required: the connector's own DNS name on omni_net so connector-manager
      # can call back to it. Must match the compose service key (`web-connector`),
      # which is the DNS alias automatically registered on the bridge network.
      CONNECTOR_HOST_NAME: web-connector
      CONNECTOR_MANAGER_URL: ${CONNECTOR_MANAGER_URL}
      RUST_LOG: ${RUST_LOG:-info}
    networks:
      - omni_net
    restart: unless-stopped
    logging: *default-logging

  # Local embeddings via Ollama. OpenAI-compatible /v1/embeddings endpoint
  # consumed by the `ai` service (Local provider, configured in the admin UI
  # at /admin/settings/embeddings). Default is the ggml-org canonical Q8_0
  # GGUF of google/embeddinggemma-300m (768-dim dense), which matches the
  # pre-baked partial HNSW index in services/migrations/042. Q8_0 is chosen
  # over Q4 because Graviton4's i8mm instructions make int8 matmul native:
  # measured ~55 tok/s, statistically tied with the QAT-Q4_0 variant but
  # with near-FP retrieval quality. Switch via EMBEDDING_MODEL.
  #
  # ws.ergomorph.com is single-vCPU + ~7.6 GiB RAM with Huly already resident,
  # so this service is hard-capped (cpus: 0.6, mem_limit: 2500m) to keep it
  # from starving Huly/Postgres/web. Per-chunk latency at this cap is ~5.5 s
  # for ~300-token inputs; first reindex of a typical corpus is ~1–2 h.
  #
  # Image: `alpine/ollama` is a community Wolfi-based repackage (~700 MB vs
  # ~3 GB for the official `ollama/ollama`), bash-less (sh-only), with the
  # binary at /usr/bin/ollama. Same Ollama feature set; pin a specific tag
  # so we don't get surprised by upstream packaging changes.
  #
  # First-deploy / model-change: the entrypoint pulls EMBEDDING_MODEL on boot
  # and survives if the pull fails (Ollama will retry on first request). Models
  # persist in the `ollama_models` volume across container restarts.
  embeddings:
    image: alpine/ollama:0.21.2
    container_name: omni-embeddings
    profiles: [embeddings]
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        ollama serve &
        SERVE_PID=$$!
        echo "waiting for ollama daemon..."
        until ollama list >/dev/null 2>&1; do sleep 1; done
        echo "pulling model: ${EMBEDDING_MODEL}"
        ollama pull "${EMBEDDING_MODEL}" || echo "pull failed; will retry on demand"
        wait $$SERVE_PID
    environment:
      OLLAMA_HOST: 0.0.0.0:${LOCAL_EMBEDDINGS_PORT:-11434}
      # Keep model resident; otherwise Ollama unloads after 5min idle and
      # the next embedding call eats a multi-second cold start.
      OLLAMA_KEEP_ALIVE: "24h"
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-hf.co/ggml-org/embeddinggemma-300M-GGUF:Q8_0}
    expose:
      - "${LOCAL_EMBEDDINGS_PORT:-11434}"
    volumes:
      - ollama_models:/root/.ollama
    cpus: 0.6
    mem_limit: 2500m
    networks:
      - omni_net
    restart: unless-stopped
    healthcheck:
      # `ollama list` returns 0 once the daemon is up, even before the model
      # finishes downloading. Sufficient for compose readiness.
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging: *default-logging

  # Huly connector — sibling-deployment only. Indexes content from the Huly
  # workspace running in the `-p huly` compose project on this same host.
  # Attaches to the external `huly_net` (literal name, pinned in compose.yml)
  # so it can reach Huly's account/transactor/minio/collaborator services
  # without going through the public ingress.
  huly-connector:
    image: ${OMNI_IMAGE_PREFIX:?OMNI_IMAGE_PREFIX must be set in omni.conf}/omni-huly-connector:${OMNI_VERSION:-latest}
    container_name: omni-huly-connector
    profiles: [huly]
    depends_on:
      connector-manager:
        condition: service_started
    environment:
      PORT: 4016
      # Same convention as web-connector: connector-manager calls back to
      # this DNS alias on omni_net.
      CONNECTOR_HOST_NAME: huly-connector
      CONNECTOR_MANAGER_URL: ${CONNECTOR_MANAGER_URL}
      NODE_ENV: production
    networks:
      - omni_net
      - huly_net
    restart: unless-stopped
    logging: *default-logging

networks:
  omni_net:
    driver: bridge
  proxy_net:
    external: true
  # Cross-stack: pinned to literal name `huly_net` in the huly stack's
  # compose.yml so this `external: true` reference resolves regardless
  # of the huly compose project name. Required for huly-connector.
  huly_net:
    external: true
    name: huly_net

volumes:
  postgres_data:
    name: omni-postgres-data
  redis_data:
    name: omni-redis-data
  ai_models:
    name: omni-ai-models
  ollama_models:
    name: omni-ollama-models
  mem0_history:
    name: omni-mem0-history
